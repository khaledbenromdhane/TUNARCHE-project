security:
    # ═══════════════════════════════════════════════════════════
    # Password Hasher — BCRYPT
    # ✅ FIX LOGIN : doit correspondre à l'algo utilisé dans les controllers
    # ═══════════════════════════════════════════════════════════
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 12

    # ═══════════════════════════════════════════════════════════
    # User Provider
    # ═══════════════════════════════════════════════════════════
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # ═══════════════════════════════════════════════════════════
    # Firewalls
    # ═══════════════════════════════════════════════════════════
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            # Formulaire de connexion
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                default_target_path: app_home
                always_use_default_target_path: false
                enable_csrf: true

            # Déconnexion
            logout:
                path: app_logout
                target: app_login
                invalidate_session: true

            # Se souvenir de moi
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                remember_me_parameter: _remember_me

            # Google OAuth — Custom authenticator
            custom_authenticators:
                - App\Security\GoogleAuthenticator

    # ═══════════════════════════════════════════════════════════
    # Contrôle d'accès
    # ═══════════════════════════════════════════════════════════
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/home, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/user, roles: IS_AUTHENTICATED_FULLY }

    # ═══════════════════════════════════════════════════════════
    # Hiérarchie des rôles
    # ═══════════════════════════════════════════════════════════
    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER, ROLE_ARTIST]
        ROLE_ARTIST: ROLE_USER
